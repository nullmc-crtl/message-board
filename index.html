<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Guestbook | Cloud Powered</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📖 Public Guestbook</h1>
            <p class="subtitle">Leave a message for the world to see</p>
        </header>

        <!-- ADMIN PANEL (Hidden by default) -->
        <div id="adminPanel" class="glass-card admin-panel" style="display: none;">
            <h2>🔐 Admin Controls</h2>
            <div class="admin-grid">
                <div class="admin-stat">
                    <span class="stat-number" id="todayMessages">0</span>
                    <span class="stat-label">Today</span>
                </div>
                <div class="admin-actions">
                    <button onclick="exportData()" class="admin-action-btn">📥 Export JSON</button>
                    <button onclick="importData()" class="admin-action-btn">📤 Import JSON</button>
                    <button onclick="viewRawData()" class="admin-action-btn">👁️ View Raw</button>
                    <button onclick="deleteAllMessages()" class="admin-action-btn danger">💣 Delete All</button>
                </div>
            </div>
            <div class="admin-search-box">
                <input type="text" id="adminSearch" placeholder="Admin search (ID, author, content)...">
            </div>
        </div>

        <div class="api-status" id="apiStatus">Checking connection...</div>

        <div class="glass-card">
            <form id="messageForm">
                <div class="form-group">
                    <label for="author">Your Name</label>
                    <input type="text" id="author" placeholder="Enter your name..." required maxlength="50">
                </div>
                <div class="form-group">
                    <label for="content">Your Message</label>
                    <textarea id="content" placeholder="Write something memorable..." required maxlength="1000"></textarea>
                </div>
                <button type="submit" class="btn" id="submitBtn">Post Message</button>
            </form>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalMessages">0</span>
                <span class="stat-label">Total Messages</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="uniqueAuthors">0</span>
                <span class="stat-label">Unique Authors</span>
            </div>
        </div>

        <div class="glass-card">
            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by name or message content...">
                <button class="btn" onclick="clearSearch()" style="width: auto; padding: 1rem 1.5rem;">Clear</button>
            </div>
            
            <div id="messagesContainer" class="messages-grid">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>Loading messages...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>
</html>
