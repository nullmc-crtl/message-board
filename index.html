<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Send your Message</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::after {
            left: 100%;
        }

        .search-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
        }

        .stats {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .messages-grid {
            display: grid;
            gap: 1.5rem;
        }

        .message-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .message-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .message-card:hover {
            transform: translateX(5px);
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
        }

        .message-card:hover::before {
            opacity: 1;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .author-name {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
            color: white;
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: monospace;
        }

        .message-content {
            color: var(--text);
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success);
        }

        .notification.error {
            background: var(--error);
        }

        .highlight {
            background: rgba(99, 102, 241, 0.3);
            padding: 0 2px;
            border-radius: 3px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .glass-card {
                padding: 1.5rem;
            }
            
            .search-section {
                flex-direction: column;
            }
            
            .search-input {
                width: 100%;
            }
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Messages</h1>
            <p class="subtitle">Leave a message for the world to see</p>
        </header>

        <div class="glass-card">
            <form id="messageForm">
                <div class="form-group">
                    <label for="author">Your Name</label>
                    <input type="text" id="author" placeholder="Enter your name..." required maxlength="50">
                </div>
                <div class="form-group">
                    <label for="content">Your Message</label>
                    <textarea id="content" placeholder="Write something memorable..." required maxlength="1000"></textarea>
                </div>
                <button type="submit" class="btn">Post Message</button>
            </form>
        </div>

        <div class="stats">
            <div class="stat-item">
                <span class="stat-number" id="totalMessages">0</span>
                <span class="stat-label">Total Messages</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="uniqueAuthors">0</span>
                <span class="stat-label">Unique Authors</span>
            </div>
        </div>

        <div class="glass-card">
            <div class="search-section">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by name or message content...">
                <button class="btn" onclick="clearSearch()" style="width: auto; padding: 1rem 1.5rem;">Clear</button>
            </div>
            
            <div id="messagesContainer" class="messages-grid">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <p>No messages yet. Be the first to write something!</p>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script>
        // Data Management
        const STORAGE_KEY = 'guestbook_messages';
        
        function getMessages() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function saveMessages(messages) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Just now';
            if (minutes < 60) return `${minutes}m ago`;
            if (hours < 24) return `${hours}h ago`;
            if (days < 7) return `${days}d ago`;
            return date.toLocaleDateString();
        }

        // UI Functions
        function showNotification(message, type = 'success') {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `notification ${type} show`;
            setTimeout(() => {
                notif.classList.remove('show');
            }, 3000);
        }

        function updateStats(messages) {
            document.getElementById('totalMessages').textContent = messages.length;
            const uniqueAuthors = new Set(messages.map(m => m.author.toLowerCase())).size;
            document.getElementById('uniqueAuthors').textContent = uniqueAuthors;
        }

        function getInitials(name) {
            return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
        }

        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function escapeRegex(string) {
            return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function renderMessages(messages, searchQuery = '') {
            const container = document.getElementById('messagesContainer');
            
            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <p>${searchQuery ? 'No messages match your search.' : 'No messages yet. Be the first to write something!'}</p>
                    </div>
                `;
                return;
            }

            // Sort by newest first
            messages.sort((a, b) => b.timestamp - a.timestamp);

            container.innerHTML = messages.map(msg => `
                <div class="message-card" data-id="${msg.id}">
                    <div class="message-header">
                        <div class="author-name">
                            <div class="author-avatar">${getInitials(msg.author)}</div>
                            <span>${highlightText(escapeHtml(msg.author), searchQuery)}</span>
                        </div>
                        <span class="timestamp">${formatDate(msg.timestamp)}</span>
                    </div>
                    <div class="message-content">${highlightText(escapeHtml(msg.content), searchQuery)}</div>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function filterMessages(query) {
            const messages = getMessages();
            const lowerQuery = query.toLowerCase();
            const filtered = messages.filter(msg => 
                msg.author.toLowerCase().includes(lowerQuery) || 
                msg.content.toLowerCase().includes(lowerQuery)
            );
            renderMessages(filtered, query);
        }

        function clearSearch() {
            document.getElementById('searchInput').value = '';
            renderMessages(getMessages());
        }

        // Event Listeners
        document.getElementById('messageForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const authorInput = document.getElementById('author');
            const contentInput = document.getElementById('content');
            
            const author = authorInput.value.trim();
            const content = contentInput.value.trim();
            
            if (!author || !content) {
                showNotification('Please fill in all fields', 'error');
                return;
            }

            const newMessage = {
                id: generateId(),
                author: author,
                content: content,
                timestamp: Date.now()
            };

            const messages = getMessages();
            messages.push(newMessage);
            saveMessages(messages);
            
            // Clear form
            contentInput.value = '';
            
            // Update UI
            const searchQuery = document.getElementById('searchInput').value;
            if (searchQuery) {
                filterMessages(searchQuery);
            } else {
                renderMessages(messages);
            }
            updateStats(messages);
            
            showNotification('Message posted successfully!');
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            filterMessages(e.target.value);
        });

        // Initialize
        const initialMessages = getMessages();
        renderMessages(initialMessages);
        updateStats(initialMessages);

        // Add some demo data if empty (optional - remove this if you want to start completely empty)
        if (initialMessages.length === 0) {
            const demoMessages = [
                {
                    id: generateId(),
                    author: "Ayben",
                    content: "bruh",
                    timestamp: Date.now() - 3600000
      }
            ];
            saveMessages(demoMessages);
            renderMessages(demoMessages);
            updateStats(demoMessages);
        }
    </script>
</body>
  </html>
